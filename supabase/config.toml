[project]
project_id = "rahvprcgzuknpsihhjlx"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["https://washclean.vercel.app"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.sms]
enable_signup = true
enable_confirmations = false

[functions.send-verification-code]
verify_jwt = false

[functions.verify-phone-code]
verify_jwt = false

[functions.create-customer]
verify_jwt = true

[functions.send-sms]
verify_jwt = true
